name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug", "triage"]
projects: ["SachkovTech"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: Что произошло?
      description: Напиши дополнительно , что ты ожидал увидеть?
      placeholder: Напиши о баге!
      value: "Я нашел баг!"
    validations:
      required: true
  - type: dropdown
    id: Приоритет важности
    attributes:
      label: Приоритет
      description: Какой приоритет ты думаешь стоит дать этой задачи?
      options:
        - P0 (Очень важно, 1-3 дня)
        - P1 (Важно, 3-7 дней)
        - P2 (Требуется решить в течение недели)
        - P3 (Желательно исправить в течение месяца
        - P4 (В беклог)
      default: 2
    validations:
      required: true
  - type: textarea
    id: Логи 
    attributes:
      label: Вставь логи если имеются
      render: shell
