name: Другое
title: "[Other]: "
description: Опишите ситуацию с которой столкнулись если не подходят другие шаблоны (CI/CD сюда же)
labels: []
projects: ["SachkovTech"]
body:
  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Добавь описание задачи, идеи или общего элемента.
      placeholder: Например: подробно опиши суть задачи, идеи или других объектов, которые требуют рассмотрения.
    validations:
      required: true
  - type: dropdown
    id: priority-level
    attributes:
      label: Приоритет
      description: Какой приоритет ты думаешь стоит дать этой задаче?
      options:
        - P0 (Очень важно, 1-3 дня)
        - P1 (Важно, 3-7 дней)
        - P2 (Требуется решить в течение недели)
        - P3 (Желательно решить в течение месяца)
        - P4 (Когда-нибудь)
      default: P3 (Желательно решить в течение месяца)
    validations:
      required: true
  - type: number
    id: story-points
    attributes:
      label: Количество сторипоинтов (Story Points)
      description: Укажи, сколько сторипоинтов потребуется для выполнения этой задачи. Укажи от 0 до 20.
      placeholder: Например: 0 (если задача не требует реализации) или выше.
      min: 0
      max: 20
    validations:
      required: true
  - type: textarea
    id: additional-notes
    attributes:
      label: Дополнительные заметки
      description: Добавь любые дополнительные детали к задаче.
      placeholder: Например: уточнения, примеры или ссылки на документы.
    validations:
      required: false