services:
  issues:
    build:
      context: ./backend
      dockerfile: ./src/SachkovTech.Web/Dockerfile
      args:
        NUGET_USERNAME: ${NUGET_USERNAME}
        NUGET_PASSWORD: ${NUGET_PASSWORD}
    ports:
      - "58080:8080"
    depends_on:
      - postgres
      - minio
      - seq
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker

  files:
    build:
      context: ./FileService
      dockerfile: ./src/FileService/Dockerfile
      args:
        NUGET_USERNAME: ${NUGET_USERNAME}
        NUGET_PASSWORD: ${NUGET_PASSWORD}
    ports:
      - "58081:8080"
    depends_on:
      - minio
      - postgres
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
  
  emails:
    build:
      context: ./EmailNotificationService
      dockerfile: ./EmailNotificationService.API/Dockerfile
      args:
        NUGET_USERNAME: ${NUGET_USERNAME}
        NUGET_PASSWORD: ${NUGET_PASSWORD}
    ports:
      - "58082:8080"
    depends_on:
      - seq
      - rabbitmq
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker

  notifications:
    build:
      context: ./NotificationService
      dockerfile: ./src/NotificationService/Dockerfile
      args:
        NUGET_USERNAME: ${NUGET_USERNAME}
        NUGET_PASSWORD: ${NUGET_PASSWORD}
    ports:
      - "58083:8080"
    depends_on:
      - issues
      - rabbitmq
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
  
  postgres:
    container_name: postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: sachkov_tech
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgadmin:
    container_name: pgadmin_container_sachkov
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_SERVER_1_HOST: postgres
      PGADMIN_SERVER_1_PORT: 5434
      PGADMIN_SERVER_1_USERNAME: postgres
      PGADMIN_SERVER_1_PASSWORD: postgres
      PGADMIN_SERVER_1_DBNAME: sachkov_tech
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    restart: unless-stopped

  minio:
    container_name: minio
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    restart: always

  mongodb:
    image: mongo
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: mongopassword
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    # volumes:
    #   - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    ports:
      - 9200:9200
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
    restart: always

  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:8.16.1
    ports:
      - 5601:5601
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    restart: always

  prometheus:
    container_name: prometheus
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    
  seq:
    image: datalust/seq:latest
    container_name: seq-logs
    restart: always
    environment:
      - ACCEPT_EULA=Y
    ports:
      - 5341:5341
      - 8081:80
  
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf # Mount the nginx.conf file
    depends_on:
      - issues
      - files
      - emails
      - notifications
    restart: always

volumes:
  pgadmin:
  postgres-data:
  minio_data:
  mongo_data:
  elasticsearch-data:
  prometheus_data:
  grafana_data:
  # rabbitmq_data:
